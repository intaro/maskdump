version: 2
updates:
  - package-ecosystem: gomod
    directory: /
    schedule:
      interval: weekly
    commit-message:
      # build: is a non-releasing type per docs/releasing.md
      prefix: "build(deps)"

  - package-ecosystem: gomod
    directory: /tools
    schedule:
      interval: weekly
    commit-message:
      prefix: "build(deps)"

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    commit-message:
      # ci: is a non-releasing type per docs/releasing.md
      prefix: "ci(deps)"
