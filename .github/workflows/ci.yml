name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-go@v5
      with:
        go-version-file: go.mod
        cache: true
    - name: Generate integration fixtures
      working-directory: tools
      run: go run ./testdata_generator
    - name: Verify generated fixtures are committed
      run: git diff --exit-code -- testdata
    - run: go vet ./...
    - run: go test ./...
    - run: go test -race ./...
